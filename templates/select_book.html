<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Book</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f3f7; padding: 40px; text-align: center; }
        .grid { display: flex; justify-content: center; gap: 20px; margin-top: 30px; flex-wrap: wrap; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.08); width: 190px; }
        img { width: 120px; height: 180px; object-fit: cover; border-radius: 5px; }
        button { background: #0984e3; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 15px; font-weight: 600; }
        a { color: #636e72; }
    </style>
</head>
<body>
    <h2>Select the correct book:</h2>
    <div class="grid">
        {% for book in books %}
        <div class="card">
            {% if book.thumbnail %}<img src="{{ book.thumbnail }}" alt="Cover">{% endif %}
            <h4 style="margin:10px 0 4px;">{{ book.title }}</h4>
            <p style="color:#636e72;font-size:0.9em;margin:0 0 4px;">{{ book.author }}</p>
            <p style="font-size:0.8em;color:#b2bec3;">{{ book.page_count }} pages</p>
            <form action="/confirm_book" method="POST">
                <input type="hidden" name="title" value="{{ book.title }}">
                <input type="hidden" name="author" value="{{ book.author }}">
                <input type="hidden" name="page_count" value="{{ book.page_count }}">
                <input type="hidden" name="thumbnail" value="{{ book.thumbnail }}">
                <input type="hidden" name="category" value="{{ book.category }}">
                <button type="submit">Add to List</button>
            </form>
        </div>
        {% else %}
        <p>No results found. Try a different search.</p>
        {% endfor %}
    </div>
    <br>
    <a href="/media/books">← Cancel</a>
</body>
</html>
