<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Game</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f3f7; padding: 40px; text-align: center; }
        .grid { display: flex; justify-content: center; gap: 20px; margin-top: 30px; flex-wrap: wrap; }
        .card { background: white; padding: 16px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.08); width: 200px; }
        .cover { width: 100%; height: 120px; object-fit: cover; border-radius: 6px; }
        .no-cover { width: 100%; height: 120px; background: #f0f3f7; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 2.5em; }
        button { background: #0984e3; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 10px; font-weight: 600; }
        a { color: #636e72; }
    </style>
</head>
<body>
    <h2>Select the correct game:</h2>
    <div class="grid">
        {% for game in games %}
        <div class="card">
            {% if game.cover_url %}
                <img class="cover" src="{{ game.cover_url }}" alt="Cover">
            {% else %}
                <div class="no-cover">🎮</div>
            {% endif %}
            <h4 style="margin:10px 0 4px;font-size:0.9em;">{{ game.title }}</h4>
            <p style="font-size:0.78em;color:#636e72;margin:0 0 4px;">{{ game.platform }}</p>
            <form action="/confirm_game" method="POST">
                <input type="hidden" name="title" value="{{ game.title }}">
                <input type="hidden" name="platform" value="{{ game.platform }}">
                <input type="hidden" name="cover_url" value="{{ game.cover_url }}">
                <button type="submit">Add to Backlog</button>
            </form>
        </div>
        {% else %}
        <p>No results found. Try a different search.</p>
        {% endfor %}
    </div>
    <br>
    <a href="/media/games">← Cancel</a>
</body>
</html>
